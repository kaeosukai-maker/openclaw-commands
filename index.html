<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenClaw CLI — คู่มือคำสั่ง</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&family=JetBrains+Mono:wght@400;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c0f;
    --surface: #111418;
    --border: #1e2329;
    --accent: #ff4d00;
    --accent2: #ff8c42;
    --text: #e8e6e1;
    --muted: #6b7280;
    --tag-bg: #1a1f26;
    --highlight: #1c2333;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Sarabun', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    padding: 0 0 80px;
  }

  /* Header */
  .hero {
    background: linear-gradient(135deg, #0a0c0f 0%, #111820 50%, #0f0a0a 100%);
    border-bottom: 1px solid var(--border);
    padding: 60px 40px 40px;
    position: relative;
    overflow: hidden;
  }

  .hero::before {
    content: '';
    position: absolute;
    top: -60px; right: -60px;
    width: 300px; height: 300px;
    background: radial-gradient(circle, rgba(255,77,0,0.12) 0%, transparent 70%);
    pointer-events: none;
  }

  .hero-inner {
    max-width: 1100px;
    margin: 0 auto;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 20px;
  }

  .logo-icon {
    font-size: 2rem;
    line-height: 1;
  }

  .logo-text {
    font-family: 'Syne', sans-serif;
    font-size: 1.5rem;
    font-weight: 800;
    letter-spacing: -0.02em;
    color: #fff;
  }

  .logo-version {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    color: var(--accent);
    background: rgba(255,77,0,0.1);
    border: 1px solid rgba(255,77,0,0.3);
    padding: 2px 8px;
    border-radius: 4px;
  }

  .hero h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(2rem, 5vw, 3.5rem);
    font-weight: 800;
    letter-spacing: -0.03em;
    line-height: 1.1;
    margin-bottom: 12px;
    color: #fff;
  }

  .hero h1 span { color: var(--accent); }

  .hero p {
    color: var(--muted);
    font-size: 1rem;
    max-width: 500px;
  }

  /* Search */
  .search-wrap {
    max-width: 1100px;
    margin: 32px auto 0;
    padding: 0 40px;
  }

  .search-box {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 18px 12px 44px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.875rem;
    outline: none;
    transition: border-color 0.2s;
    position: relative;
  }

  .search-container {
    position: relative;
  }

  .search-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 1rem;
    pointer-events: none;
  }

  .search-box:focus { border-color: var(--accent); }
  .search-box::placeholder { color: var(--muted); }

  /* Category filter */
  .filter-wrap {
    max-width: 1100px;
    margin: 20px auto 0;
    padding: 0 40px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .filter-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 6px 14px;
    border-radius: 20px;
    font-family: 'Sarabun', sans-serif;
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.15s;
  }

  .filter-btn:hover, .filter-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(255,77,0,0.08);
  }

  /* Main grid */
  .grid {
    max-width: 1100px;
    margin: 36px auto 0;
    padding: 0 40px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 16px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px;
    transition: border-color 0.2s, transform 0.2s;
    cursor: default;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 3px; height: 100%;
    background: var(--accent);
    opacity: 0;
    transition: opacity 0.2s;
  }

  .card:hover {
    border-color: #2a3040;
    transform: translateY(-2px);
  }

  .card:hover::before { opacity: 1; }

  .card-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 10px;
    margin-bottom: 10px;
  }

  .cmd {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.9rem;
    font-weight: 700;
    color: var(--accent2);
    background: rgba(255,140,66,0.08);
    border: 1px solid rgba(255,140,66,0.2);
    padding: 4px 10px;
    border-radius: 5px;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }

  .cmd .sub {
    color: var(--muted);
    font-weight: 400;
    font-size: 0.75rem;
  }

  .cat-tag {
    font-size: 0.68rem;
    padding: 3px 8px;
    border-radius: 12px;
    font-weight: 600;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .cat-agent    { background: rgba(99,102,241,0.15); color: #818cf8; border: 1px solid rgba(99,102,241,0.3); }
  .cat-channel  { background: rgba(34,197,94,0.12);  color: #4ade80; border: 1px solid rgba(34,197,94,0.3); }
  .cat-system   { background: rgba(251,191,36,0.12); color: #fbbf24; border: 1px solid rgba(251,191,36,0.3); }
  .cat-gateway  { background: rgba(239,68,68,0.12);  color: #f87171; border: 1px solid rgba(239,68,68,0.3); }
  .cat-tools    { background: rgba(14,165,233,0.12); color: #38bdf8; border: 1px solid rgba(14,165,233,0.3); }
  .cat-manage   { background: rgba(168,85,247,0.12); color: #c084fc; border: 1px solid rgba(168,85,247,0.3); }

  .desc {
    font-size: 0.9rem;
    color: #b0aaa0;
    line-height: 1.6;
    margin-bottom: 10px;
  }

  .example {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;
    color: var(--muted);
    background: var(--bg);
    border: 1px solid var(--border);
    padding: 8px 12px;
    border-radius: 6px;
    margin-top: 10px;
    word-break: break-all;
  }

  .example::before {
    content: '$ ';
    color: var(--accent);
  }

  /* Stats bar */
  .stats {
    max-width: 1100px;
    margin: 0 auto 8px;
    padding: 0 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .stats-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.8rem;
    color: var(--muted);
  }

  .stats-count span { color: var(--accent); }

  .hidden { display: none !important; }

  .card-expanded { grid-column: 1 / -1; }
  .opts-section { margin-top: 14px; }
  .opts-title { font-size: 0.75rem; color: var(--accent2); font-weight: 600; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.05em; }
  .opts-table { width: 100%; border-collapse: collapse; }
  .opts-table tr:hover td { background: var(--highlight); }
  .opt-flag { font-family: "JetBrains Mono", monospace; font-size: 0.75rem; color: #38bdf8; padding: 5px 12px 5px 0; white-space: nowrap; vertical-align: top; width: 260px; }
  .opt-desc { font-size: 0.85rem; color: #b0aaa0; padding: 5px 0; vertical-align: top; }
  .example-block { margin-bottom: 8px; }
  .example-desc { font-size: 0.78rem; color: var(--muted); margin-top: 4px; padding-left: 2px; }

  @media (max-width: 600px) {
    .hero { padding: 40px 20px 30px; }
    .search-wrap, .filter-wrap, .grid, .stats { padding: 0 20px; }
    .grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="hero">
  <div class="hero-inner">
    <div class="logo">
      <span class="logo-icon">🦞</span>
      <span class="logo-text">OpenClaw</span>
      <span class="logo-version">v2026.2.23</span>
    </div>
    <h1>คู่มือ<span>คำสั่ง</span> CLI</h1>
    <p>อ้างอิงคำสั่งทั้งหมดพร้อมคำอธิบายภาษาไทย จัดกลุ่มตามหมวดหมู่</p>
  </div>
</div>

<div class="search-wrap">
  <div class="search-container">
    <span class="search-icon">🔍</span>
    <input class="search-box" type="text" placeholder="ค้นหาคำสั่ง... เช่น agent, telegram, gateway" id="search">
  </div>
</div>

<div class="filter-wrap" id="filters">
  <button class="filter-btn active" data-cat="all">ทั้งหมด</button>
  <button class="filter-btn" data-cat="agent">🤖 Agent</button>
  <button class="filter-btn" data-cat="channel">💬 Channel</button>
  <button class="filter-btn" data-cat="gateway">⚡ Gateway</button>
  <button class="filter-btn" data-cat="system">⚙️ System</button>
  <button class="filter-btn" data-cat="tools">🛠️ Tools</button>
  <button class="filter-btn" data-cat="manage">📋 Manage</button>
</div>

<div class="stats" style="margin-top:28px">
  <div class="stats-count">แสดง <span id="count">0</span> คำสั่ง</div>
</div>

<div class="grid" id="grid"></div>

<script>
const commands = [
  {
    cmd: "agents",
    sub: "*",
    cat: "agent",
    catLabel: "Agent",
    desc: "จัดการ Agent แยก (workspace, auth, routing) — สร้าง ลบ ตั้งค่า Agent ได้หลายตัวพร้อมกัน",
    example: "openclaw agents --help"
  },
  {
    cmd: "agent",
    sub: "",
    cat: "agent",
    catLabel: "Agent",
    desc: "รัน Agent 1 รอบผ่าน Gateway — ส่งข้อความถึง Agent โดยตรงและรับคำตอบกลับ",
    example: "openclaw agent --to +66812345678 --message \"สรุปงานวันนี้\" --deliver",
    options: [
      { flag: "--agent <id>", desc: "ระบุ Agent ID (ข้าม routing bindings)" },
      { flag: "--channel <channel>", desc: "ช่องทางส่ง: telegram, whatsapp, discord, slack, line, zalo ฯลฯ" },
      { flag: "--deliver", desc: "ส่งคำตอบกลับไปยัง channel (default: false)" },
      { flag: "--json", desc: "แสดงผลเป็น JSON" },
      { flag: "--local", desc: "รัน agent แบบ embedded บนเครื่อง (ต้องมี API key)" },
      { flag: "-m, --message <text>", desc: "ข้อความที่ส่งให้ agent" },
      { flag: "--reply-channel <channel>", desc: "ระบุ channel สำหรับส่งคำตอบ (แยกจาก routing)" },
      { flag: "--reply-to <target>", desc: "ระบุ target สำหรับส่งคำตอบ" },
      { flag: "--session-id <id>", desc: "ใช้ session ID ที่กำหนด" },
      { flag: "-t, --to <number>", desc: "เบอร์ผู้รับในรูปแบบ E.164 เช่น +66812345678" },
      { flag: "--thinking <level>", desc: "ระดับการคิด: off | minimal | low | medium | high" },
      { flag: "--timeout <seconds>", desc: "กำหนด timeout (default: 600 วินาที)" },
      { flag: "--verbose <on|off>", desc: "เปิด/ปิด verbose log สำหรับ session" },
    ],
    examples: [
      { cmd: 'openclaw agent --to +15555550123 --message "status update"', desc: "เริ่ม session ใหม่" },
      { cmd: 'openclaw agent --agent ops --message "Summarize logs"', desc: "ใช้ agent ชื่อ ops" },
      { cmd: 'openclaw agent --session-id 1234 --message "Summarize inbox" --thinking medium', desc: "ระบุ session + thinking level" },
      { cmd: 'openclaw agent --to +15555550123 --message "Trace logs" --verbose on --json', desc: "เปิด verbose + output JSON" },
      { cmd: 'openclaw agent --agent ops --message "Generate report" --deliver --reply-channel slack --reply-to "#reports"', desc: "ส่งคำตอบไปที่ Slack #reports" },
    ]
  },
  {
    cmd: "acp",
    sub: "*",
    cat: "agent",
    catLabel: "Agent",
    desc: "Agent Control Protocol — เครื่องมือสำหรับควบคุม Agent ระดับ protocol",
    example: "openclaw acp --help"
  },
  {
    cmd: "channels",
    sub: "*",
    cat: "channel",
    catLabel: "Channel",
    desc: "จัดการช่องทางแชทที่เชื่อมต่อ เช่น Telegram, Discord, WhatsApp, Slack — login/logout/ดูสถานะ",
    example: "openclaw channels login --verbose"
  },
  {
    cmd: "message",
    sub: "*",
    cat: "channel",
    catLabel: "Channel",
    desc: "ส่ง อ่าน และจัดการข้อความ — ส่งข้อความผ่าน channel ที่ต้องการได้โดยตรง",

  },
  {
    cmd: "pairing",
    sub: "*",
    cat: "channel",
    catLabel: "Channel",
    desc: "จับคู่ DM อย่างปลอดภัย — อนุมัติ/ปฏิเสธคำขอ pairing จากผู้ใช้ใน DM",
    example: "openclaw pairing --help"
  },
  {
    cmd: "directory",
    sub: "*",
    cat: "channel",
    catLabel: "Channel",
    desc: "ค้นหา Contact ID และ Group ID ของตัวเอง เพื่อน และกลุ่มใน channel ต่างๆ",
    example: "openclaw directory --help"
  },
  {
    cmd: "gateway",
    sub: "*",
    cat: "gateway",
    catLabel: "Gateway",
    desc: "รัน ตรวจสอบ และ query WebSocket Gateway — หัวใจหลักของ OpenClaw ที่เชื่อมทุกอย่าง",
    example: "openclaw gateway --port 18789"
  },
  {
    cmd: "health",
    sub: "",
    cat: "gateway",
    catLabel: "Gateway",
    desc: "ดึงข้อมูลสถานภาพ (health) จาก Gateway ที่กำลังทำงานอยู่ว่า online/offline หรือมีปัญหาอะไร",
    example: "openclaw health"
  },
  {
    cmd: "status",
    sub: "",
    cat: "gateway",
    catLabel: "Gateway",
    desc: "แสดงสถานะ channel ทั้งหมดและผู้รับ session ล่าสุด — ดูภาพรวมว่า channel ไหนเปิดอยู่บ้าง",
    example: "openclaw status"
  },
  {
    cmd: "logs",
    sub: "",
    cat: "gateway",
    catLabel: "Gateway",
    desc: "ดู log ของ Gateway แบบ real-time ผ่าน RPC — เหมือน tail -f แต่ดึงจาก Gateway",
    example: "openclaw logs"
  },
  {
    cmd: "nodes",
    sub: "*",
    cat: "gateway",
    catLabel: "Gateway",
    desc: "จัดการ node ที่ Gateway เป็นเจ้าของ — จับคู่ node และส่งคำสั่งถึง node",

  },
  {
    cmd: "node",
    sub: "*",
    cat: "gateway",

  },
  {
    cmd: "config",
    sub: "*",
    cat: "system",
    catLabel: "System",
    desc: "ตั้งค่า config แบบ non-interactive (get/set/unset) — แก้ไขค่า config โดยตรงผ่าน command",

  },
  {
    cmd: "configure",
    sub: "",
    cat: "system",
    catLabel: "System",
    desc: "Wizard ตั้งค่าแบบ interactive — ตั้งค่า credentials, channels, gateway และ agent defaults ทีละขั้น",

  },
  {
    cmd: "onboard",
    sub: "",
    cat: "system",
    catLabel: "System",
    desc: "Wizard onboarding เริ่มต้น — ตั้งค่า gateway, workspace และ skills สำหรับมือใหม่",
    example: "openclaw onboard"
  },
  {
    cmd: "setup",
    sub: "",
    cat: "system",
    catLabel: "System",
    desc: "Initialize config และ agent workspace ตั้งแต่ต้น — ใช้ตอนติดตั้งครั้งแรก",
    example: "openclaw setup"
  },
  {
    cmd: "reset",
    sub: "",
    cat: "system",
    catLabel: "System",
    desc: "รีเซ็ต config และ state ทั้งหมด (CLI ยังอยู่) — ใช้ตอนต้องการเริ่มต้นใหม่",
    example: "openclaw reset"
  },
  {
    cmd: "update",
    sub: "*",
    cat: "system",
    catLabel: "System",
    desc: "อัปเดต OpenClaw และตรวจสอบ update channel — ดูว่ามีเวอร์ชันใหม่ไหม",

  },
  {
    cmd: "uninstall",
    sub: "",
    cat: "system",
    catLabel: "System",
    desc: "ถอนการติดตั้ง gateway service และข้อมูล local ทั้งหมด (CLI ยังอยู่)",
    example: "openclaw uninstall"
  },
  {
    cmd: "doctor",
    sub: "",
    cat: "tools",
    catLabel: "Tools",
    desc: "ตรวจสุขภาพระบบและแก้ปัญหาเบื้องต้น — ดูว่า gateway และ channel มีปัญหาอะไรบ้าง",

  },
  {
    cmd: "models",
    sub: "*",
    cat: "tools",

  {
    cmd: "browser",
    sub: "*",

  {
    cmd: "dashboard",
    sub: "",
    cat: "tools",
    catLabel: "Tools",
    desc: "เปิด Control UI (Dashboard) ใน browser พร้อม token ปัจจุบัน — เหมือนกดเข้าหน้า web",

  },
  {
    cmd: "qr",
    sub: "",
    cat: "tools",
    catLabel: "Tools",
    desc: "สร้าง QR code สำหรับ iOS pairing — ใช้จับคู่กับ iPhone",
    example: "openclaw qr"
  },
  {
    cmd: "sessions",
    sub: "*",
    cat: "manage",
    catLabel: "Manage",
    desc: "แสดงรายการ session สนทนาที่บันทึกไว้ — ดูประวัติการคุยกับ agent",

  },
  {
    cmd: "memory",
    sub: "*",
    cat: "manage",
    catLabel: "Manage",
    desc: "ค้นหาและ reindex ไฟล์ memory ของ agent — จัดการความทรงจำระยะยาวของ agent",
    example: "openclaw memory --help"
  },
  {
    cmd: "cron",
    sub: "*",
    cat: "manage",
    catLabel: "Manage",
    desc: "จัดการ cron job ผ่าน Gateway scheduler — ตั้งงานให้ agent ทำอัตโนมัติตามเวลา",
    example: "openclaw cron --help"
  },
  {
    cmd: "hooks",
    sub: "*",
    cat: "manage",
    catLabel: "Manage",

const catColors = {
  agent: "cat-agent",
  channel: "cat-channel",
  gateway: "cat-gateway",
  system: "cat-system",
  tools: "cat-tools",
  manage: "cat-manage"
};

const catEmoji = {
  agent: "🤖", channel: "💬", gateway: "⚡", system: "⚙️", tools: "🛠️", manage: "📋"
};

let activeCat = "all";
let searchVal = "";

function render() {
  const grid = document.getElementById("grid");
  const filtered = commands.filter(c => {
    const matchCat = activeCat === "all" || c.cat === activeCat;
    const q = searchVal.toLowerCase();
    const matchSearch = !q || c.cmd.includes(q) || c.desc.includes(q) || c.catLabel.toLowerCase().includes(q);
    return matchCat && matchSearch;
  });

  document.getElementById("count").textContent = filtered.length;

  grid.innerHTML = filtered.map(c => {
    const isExpanded = !!(c.options && c.examples);
    const optionsHtml = isExpanded
      ? `<div class="opts-section"><div class="opts-title">⚙️ Options</div><table class="opts-table">${c.options.map(o=>`<tr><td class="opt-flag">${o.flag}</td><td class="opt-desc">${o.desc}</td></tr>`).join("")}</table></div><div class="opts-section"><div class="opts-title">📋 ตัวอย่าง</div>${c.examples.map(e=>`<div class="example-block"><div class="example">${e.cmd}</div><div class="example-desc">${e.desc}</div></div>`).join("")}</div>`
      : `<div class="example">${c.example}</div>`;
    return `<div class="card${isExpanded?' card-expanded':''}" data-cat="${c.cat}"><div class="card-header"><div class="cmd">openclaw ${c.cmd}${c.sub?` <span class="sub">${c.sub}</span>`:""}</div><span class="cat-tag ${catColors[c.cat]}">${catEmoji[c.cat]} ${c.catLabel}</span></div><p class="desc">${c.desc}</p>${optionsHtml}</div>`;
  }).join("");
}

document.getElementById("search").addEventListener("input", e => {
  searchVal = e.target.value;
  render();
});

document.getElementById("filters").addEventListener("click", e => {
  const btn = e.target.closest(".filter-btn");
  if (!btn) return;
  document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  activeCat = btn.dataset.cat;
  render();
});

render();
</script>
</body>
</html>
